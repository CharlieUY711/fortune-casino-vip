<script>
(function(){
  // --- Estado ---
  let saldo = 1000;
  let apuesta = 10;
  let girando = false;
  const numeros = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
  const rojos  = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

  function colorNum(n){ return n===0 ? 'verde' : rojos.includes(n) ? 'rojo' : 'negro'; }

  // --- Actualizar saldo en UI ---
  function updateUI(){
    document.querySelectorAll('[data-saldo]').forEach(el => el.textContent = '</html> + saldo.toLocaleString());
    document.querySelectorAll('[data-apuesta]').forEach(el => el.textContent = '</html> + apuesta.toLocaleString());
  }

  // --- Girar ---
  function girar(){
    if(girando || saldo < apuesta){ 
      if(saldo < apuesta) showToast('❌ Saldo insuficiente');
      return; 
    }
    girando = true;
    saldo -= apuesta;
    updateUI();

    // Animar ruleta si existe el elemento
    const rueda = document.querySelector('[data-rueda],[class*="rueda"],[class*="wheel"],canvas');
    if(rueda && rueda.style !== undefined){
      rueda.style.transition = 'transform 3s cubic-bezier(0.17,0.67,0.12,0.99)';
      const deg = 720 + Math.floor(Math.random()*360);
      rueda.style.transform = `rotate(${deg}deg)`;
    }

    setTimeout(()=>{
      const resultado = numeros[Math.floor(Math.random()*numeros.length)];
      const color = colorNum(resultado);
      const ganancia = color !== 'verde' ? apuesta * 2 : apuesta * 35;
      saldo += ganancia;
      girando = false;
      updateUI();
      showToast(`🎯 ${resultado} ${color.toUpperCase()} — Ganaste ${ganancia}`);
      logHistorial(resultado, color, ganancia);
    }, 3000);
  }

  // --- Chips de apuesta ---
  function setApuesta(val){ apuesta = val; updateUI(); }

  // --- Toast ---
  function showToast(msg){
    let t = document.getElementById('_toast');
    if(!t){ 
      t = document.createElement('div');
      t.id = '_toast';
      t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1c1a12;border:1px solid #f2ca50;color:#f2ca50;padding:12px 24px;border-radius:8px;font-weight:bold;z-index:9999;transition:opacity 0.3s;font-family:serif;letter-spacing:0.05em';
      document.body.appendChild(t);
    }
    t.textContent = msg; t.style.opacity='1';
    clearTimeout(t._timer);
    t._timer = setTimeout(()=>{ t.style.opacity='0'; }, 3000);
  }

  // --- Historial ---
  function logHistorial(num, color, gan){
    const list = document.querySelector('[data-historial],[class*="historial"],[class*="history"]');
    if(!list) return;
    const item = document.createElement('div');
    item.className = 'flex justify-between text-sm py-1 border-b border-white/5';
    item.innerHTML = `<span class="font-bold ${color==='rojo'?'text-red-400':color==='verde'?'text-green-400':'text-gray-300'}">${num}</span><span class="text-primary">+${gan}</span>`;
    list.prepend(item);
  }

  // --- Bindear botones ---
  document.addEventListener('DOMContentLoaded', ()=>{
    updateUI();

    // Botón girar (cualquier variante)
    document.querySelectorAll('button').forEach(btn => {
      const txt = btn.textContent.trim().toUpperCase();
      if(['GIRAR','SPIN','LANZAR','APOSTAR','GIRAR RUEDA','JUGAR'].some(k => txt.includes(k))){
        btn.addEventListener('click', girar);
      }
    });

    // Chips de apuesta
    document.querySelectorAll('button').forEach(btn => {
      const txt = btn.textContent.trim();
      if(['10','50','100','500','1000','5000'].includes(txt)){
        btn.addEventListener('click', ()=> setApuesta(parseInt(txt)));
      }
    });
  });
})();
</script>
