    <script>
        // CONFIGURACIÓN SUPABASE
        const SUPABASE_URL = "https://gfxxhquajzcdslayhmhs.supabase.co";
        const SUPABASE_KEY = "{{DATA:TEXT:TEXT_133}}"; // Usando la Anon Key proporcionada
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadUserData() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .single();

                if (profile) {
                    document.getElementById('user-balance').innerText = `$${profile.balance.toLocaleString()}`;
                    document.getElementById('username-display').innerText = profile.username || 'VIP Member';
                }
            }
        }

        // Suscripción Realtime para el balance
        const balanceSubscription = supabase
            .channel('public:profiles')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles' }, payload => {
                loadUserData();
            })
            .subscribe();

        loadUserData();
    </script>
