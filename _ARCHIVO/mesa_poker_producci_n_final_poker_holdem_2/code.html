<script>
    // Configuration
    const SUPABASE_URL = "SUPABASE_URL_PLACEHOLDER";
    const SUPABASE_KEY = "SUPABASE_KEY_PLACEHOLDER";
    const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

    let userBalance = 0;
    let currentRaise = 2500;
    const maxBalance = 10000; // Example placeholder limit

    // UI Translation Dictionary
    const translations = {
        ES: { fold: "RETIRARSE", check: "PASAR", call: "IGUALAR", raise: "SUBIR", balance: "SALDO" },
        EN: { fold: "FOLD", check: "CHECK", call: "CALL", raise: "RAISE", balance: "BALANCE" },
        PT: { fold: "DESISTIR", check: "PASAR", call: "PAGAR", raise: "AUMENTAR", balance: "SALDO" }
    };

    function setLanguage(lang) {
        document.getElementById('current-lang').textContent = lang;
        const t = translations[lang];
        document.getElementById('btn-fold').textContent = t.fold;
        document.getElementById('btn-check').textContent = t.check;
        const callBtn = document.getElementById('btn-call');
        callBtn.textContent = `${t.call} $100`;
    }

    // Initialize Supabase Connection
    async function initRealtime() {
        if (!supabase) return;

        // Get Initial Balance
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            const { data: profile } = await supabase
                .from('profiles')
                .select('balance')
                .eq('id', user.id)
                .single();
            
            if (profile) updateBalanceUI(profile.balance);

            // Subscribe to real-time changes
            supabase
                .channel('profile_changes')
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'profiles', 
                    filter: `id=eq.${user.id}` 
                }, payload => {
                    updateBalanceUI(payload.new.balance);
                })
                .subscribe();
        }
    }

    function updateBalanceUI(amount) {
        userBalance = amount;
        document.getElementById('user-balance').textContent = `$${amount.toLocaleString('es-UY', {minimumFractionDigits: 2})}`;
    }

    function updateRaise(delta) {
        currentRaise = Math.max(100, Math.min(userBalance, currentRaise + delta));
        document.getElementById('raise-amount').textContent = `$${currentRaise.toLocaleString()}`;
        
        // Update slider visually
        const percentage = (currentRaise / 10000) * 100; // Normalizing against 10k for visual only
        document.getElementById('raise-bar').style.width = `${percentage}%`;
        document.getElementById('raise-handle').style.left = `${percentage}%`;
    }

    function selectChip(amount) {
        // Visual feedback
        console.log(`Selected chip: ${amount}`);
    }

    async function handleAction(type) {
        const amount = (type === 'call') ? 100 : (type === 'raise') ? currentRaise : 0;
        
        if (amount > userBalance && (type === 'call' || type === 'raise')) {
            alert("Saldo insuficiente");
            return;
        }

        if (supabase) {
            try {
                const { data, error } = await supabase.rpc('process_bet_secure', {
                    bet_amount: amount,
                    game_id: 'poker_main_01',
                    bet_type: type
                });

                if (error) throw error;
                console.log("Acción procesada con éxito", data);
            } catch (err) {
                console.error("Error al procesar apuesta:", err.message);
            }
        } else {
            // Local simulation for preview
            updateBalanceUI(userBalance - amount);
            console.log(`Simulated Action: ${type} for $${amount}`);
        }
    }

    // Startup
    document.addEventListener('DOMContentLoaded', () => {
        initRealtime();
        // Fallback balance for demo
        updateBalanceUI(1240500);
    });
</script>
