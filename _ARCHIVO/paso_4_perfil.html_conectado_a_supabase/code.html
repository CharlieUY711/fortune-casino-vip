<!-- Supabase Integration Script -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
        // Supabase Initialization (Constants would normally come from secure env)
        const SUPABASE_URL = 'https://YOUR_PROJECT_REF.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchProfile() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) {
                    window.location.href = 'login.html'; // Redirect if not logged in
                    return;
                }

                const { data, error } = await supabase
                    .from('profiles')
                    .select('username, full_name, avatar_url, vip_level')
                    .eq('id', user.id)
                    .single();

                if (error) throw error;

                if (data) {
                    document.getElementById('full-name').textContent = data.full_name || 'Anonymous Guest';
                    document.getElementById('username').textContent = `@${data.username}` || '@guest';
                    document.getElementById('vip-badge').textContent = data.vip_level || 'Midnight Elite';
                    
                    if (data.avatar_url) {
                        document.getElementById('profile-avatar').src = data.avatar_url;
                        document.getElementById('avatar-mini').src = data.avatar_url;
                    }

                    // Apply VIP Level Styling
                    const badge = document.getElementById('vip-badge');
                    if (data.vip_level === 'Midnight Elite') {
                        badge.className = "absolute -bottom-2 left-1/2 -translate-x-1/2 bg-gradient-to-r from-primary via-white to-primary text-on-primary text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-tighter shadow-lg shadow-primary/30";
                    }
                }
            } catch (err) {
                console.error('Error fetching profile:', err.message);
                // Fallback mock data for design preview purposes if Supabase fails
                document.getElementById('full-name').textContent = "Julian Sterling";
                document.getElementById('username').textContent = "@jsterling_noir";
                document.getElementById('vip-badge').textContent = "Midnight Elite";
            }
        }

        async function handleLogout() {
            const { error } = await supabase.auth.signOut();
            if (!error) {
                window.location.href = 'login.html';
            } else {
                alert('Error signing out');
            }
        }

        function setLang(lang) {
            // Mock translation logic
            console.log(`Setting language to ${lang}`);
            const buttons = document.querySelectorAll('nav div div button');
            buttons.forEach(btn => {
                btn.classList.remove('border-primary', 'text-primary', 'bg-primary/10');
                btn.classList.add('border-outline-variant', 'text-on-surface-variant');
            });
            event.target.classList.add('border-primary', 'text-primary', 'bg-primary/10');
            event.target.classList.remove('border-outline-variant', 'text-on-surface-variant');
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            fetchProfile();
        });
    </script>
