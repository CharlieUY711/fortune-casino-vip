<script>
    // Supabase Configuration (Placeholders)
    const supabaseUrl = 'YOUR_SUPABASE_URL';
    const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let currentUserId = null;

    // Multi-language Support
    const translations = {
        es: {
            pot_total: "Bote Total",
            current_balance: "Balance actual",
            btn_check: "Pasar",
            btn_fold: "Noir Fold",
            btn_call: "Igualar",
            label_bet: "Apostar"
        },
        en: {
            pot_total: "Total Pot",
            current_balance: "Current Balance",
            btn_check: "Check",
            btn_fold: "Noir Fold",
            btn_call: "Call",
            label_bet: "Bet"
        },
        pt: {
            pot_total: "Pote Total",
            current_balance: "Saldo Atual",
            btn_check: "Passar",
            btn_fold: "Noir Fold",
            btn_call: "Pagar",
            label_bet: "Apostar"
        }
    };

    function updateLanguage(lang) {
        const trans = translations[lang];
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (trans[key]) el.textContent = trans[key];
        });
    }

    // Initialize Realtime Balance Listener
    async function initRealtimeBalance() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return;
        currentUserId = user.id;

        const balanceChannel = supabase
            .channel('public:profiles')
            .on(
                'postgres_changes',
                {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'profiles',
                    filter: `id=eq.${currentUserId}`
                },
                (payload) => {
                    const newBalance = payload.new.balance;
                    formatAndUpdateBalance(newBalance);
                }
            )
            .subscribe();
    }

    function formatAndUpdateBalance(amount) {
        const formatter = new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
        });
        const formatted = formatter.format(amount);
        document.getElementById('user-balance-top').textContent = formatted;
        document.getElementById('player-balance-table').textContent = formatted;
    }

    // Betting Actions via RPC
    async function handleAction(type) {
        const amount = (type === 'call' || type === 'raise') ? parseInt(document.getElementById('bet-range').value) : 0;
        
        try {
            const { data, error } = await supabase.rpc('process_bet_secure', {
                p_user_id: currentUserId,
                p_bet_type: type,
                p_amount: amount,
                p_game_id: 'platinum_holdem_01'
            });

            if (error) throw error;
            console.log('Action successful:', data);
            
            // Visual feedback
            const btn = event.currentTarget;
            btn.classList.add('brightness-150', 'scale-95');
            setTimeout(() => btn.classList.remove('brightness-150', 'scale-95'), 150);
            
        } catch (err) {
            console.error('Betting error:', err.message);
        }
    }

    // UI Range Listener
    document.getElementById('bet-range').addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        document.getElementById('bet-value').textContent = '$' + val.toLocaleString();
    });

    // Language selector change
    document.getElementById('lang-selector').addEventListener('change', (e) => {
        updateLanguage(e.target.value);
    });

    // Initialization
    window.addEventListener('DOMContentLoaded', () => {
        initRealtimeBalance();
        updateLanguage('es');
    });
</script>
