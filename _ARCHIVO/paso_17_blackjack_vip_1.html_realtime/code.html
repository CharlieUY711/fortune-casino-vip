<script>
    // Configuration and Initialization
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    
    // In a real app, these would be initialized
    // const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Mock Supabase for demonstration if not defined
    const supabase = (typeof supabase !== 'undefined') ? supabase : {
        auth: { getUser: () => ({ data: { user: { id: 'mock-uid' } } }) },
        channel: () => ({ on: function() { return this; }, subscribe: () => {} }),
        rpc: async (fn, params) => {
            console.log(`RPC Call: ${fn}`, params);
            return { data: { success: true, new_balance: 1200 }, error: null };
        }
    };

    let currentBalance = 1250.00;
    let selectedChipValue = 50;
    let gameState = 'betting'; // betting, playing, resolved

    const balanceEl = document.getElementById('user-balance');
    const betDisplayEl = document.getElementById('current-bet-display');
    const dealBtn = document.getElementById('btn-deal');
    const chipBtns = document.querySelectorAll('.chip-btn');
    const actionBtns = {
        hit: document.getElementById('btn-hit'),
        stand: document.getElementById('btn-stand'),
        double: document.getElementById('btn-double')
    };

    function updateBalanceUI(balance) {
        currentBalance = balance;
        balanceEl.textContent = `$${parseFloat(balance).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
    }

    function updateBetUI() {
        betDisplayEl.textContent = `$${selectedChipValue.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
    }

    // Realtime Connection
    async function setupRealtime() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return;

        updateBalanceUI(currentBalance); // Initial load fallback

        supabase.channel('public:profiles')
            .on('postgres_changes', { 
                event: 'UPDATE', 
                schema: 'public', 
                table: 'profiles', 
                filter: `id=eq.${user.id}` 
            }, payload => {
                if (payload.new && payload.new.balance !== undefined) {
                    updateBalanceUI(payload.new.balance);
                }
            })
            .subscribe();
    }

    // Game Actions
    async function placeBet() {
        if (gameState !== 'betting') return;
        
        try {
            const { data, error } = await supabase.rpc('process_bet_secure', {
                bet_amount: selectedChipValue,
                game_type: 'blackjack'
            });

            if (error) throw error;

            gameState = 'playing';
            updateUIState();
            // Start game logic here...
        } catch (err) {
            console.error("Bet failed:", err.message);
            alert("Error placing bet. Check balance.");
        }
    }

    function updateUIState() {
        if (gameState === 'playing') {
            dealBtn.classList.add('opacity-50', 'pointer-events-none');
            Object.values(actionBtns).forEach(btn => {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.disabled = false;
            });
        } else {
            dealBtn.classList.remove('opacity-50', 'pointer-events-none');
            Object.values(actionBtns).forEach(btn => {
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.disabled = true;
            });
        }
    }

    // Event Listeners
    chipBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            if (gameState !== 'betting') return;
            chipBtns.forEach(b => b.querySelector('div').classList.remove('chip-active'));
            btn.querySelector('div').classList.add('chip-active');
            selectedChipValue = parseInt(btn.dataset.value);
            updateBetUI();
        });
    });

    dealBtn.addEventListener('click', placeBet);

    actionBtns.hit.addEventListener('click', () => {
        if (gameState !== 'playing') return;
        console.log("Hit action triggered");
        // Hit Logic: Draw card, check bust
    });

    actionBtns.stand.addEventListener('click', () => {
        if (gameState !== 'playing') return;
        console.log("Stand action triggered");
        // Stand Logic: Dealer's turn
        gameState = 'betting';
        updateUIState();
    });

    actionBtns.double.addEventListener('click', () => {
        if (gameState !== 'playing') return;
        console.log("Double action triggered");
        // Double logic
    });

    // Initialize
    setupRealtime();
    updateBetUI();
    updateUIState();
    // Default active chip UI
    document.querySelector('[data-value="50"] div').classList.add('chip-active');

</script>
