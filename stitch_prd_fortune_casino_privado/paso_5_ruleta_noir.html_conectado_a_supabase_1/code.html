        function updateTotalsUI() {
            const totalBet = activeBets.reduce((acc, bet) => acc + bet.amount, 0);
            document.getElementById('total-bet-display').textContent = `Total Bet: $${totalBet.toFixed(2)}`;
            
            // Simplified Max Win estimate (Number bet 35:1)
            const maxBet = activeBets.length > 0 ? Math.max(...activeBets.map(b => b.amount)) : 0;
            const maxWin = maxBet * 36;
            document.getElementById('max-win-display').textContent = `Max Win: $${maxWin.toFixed(2)}`;
            
            document.getElementById('spin-button').disabled = totalBet === 0 || isSpinning;
        }

        // --- Supabase Integration ---
        async function fetchUserBalance() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                if (user) {
                    const { data, error } = await supabase
                        .from('profiles')
                        .select('balance')
                        .eq('id', user.id)
                        .single();
                    
                    if (data && !error) {
                        userBalance = data.balance;
                        updateBalanceUI();
                    }
                }
            } catch (err) {
                console.error("Error fetching balance:", err);
            }
        }

        async function handleSpin() {
            if (isSpinning || activeBets.length === 0) return;

            isSpinning = true;
            updateTotalsUI();
            
            // Animation start
            const wheel = document.getElementById('wheel-img');
            const resultDisplay = document.getElementById('result-display');
            wheel.classList.add('animate-[spin_2s_linear_infinite]');
            resultDisplay.classList.add('opacity-0', 'scale-50');

            try {
                // Call Supabase RPC
                const { data, error } = await supabase.rpc('process_bet_secure', {
                    bets: activeBets,
                    game_type: 'roulette_noir'
                });

                if (error) throw error;

                // Simulate delay for excitement
                setTimeout(() => {
                    wheel.classList.remove('animate-[spin_2s_linear_infinite]');
                    resultDisplay.classList.remove('opacity-0', 'scale-50');
                    resultDisplay.classList.add('opacity-100', 'scale-110');
                    
                    const winResult = data.result_number; // Assume backend returns number
                    document.getElementById('win-number').textContent = winResult;
                    
                    // Update Balance
                    userBalance = data.new_balance;
                    updateBalanceUI();
                    
                    // Reset bets
                    activeBets = [];
                    document.querySelectorAll('.grid-bet-item.selected').forEach(el => el.classList.remove('selected'));
                    
                    isSpinning = false;
                    updateTotalsUI();
                }, 2000);

            } catch (err) {
                console.error("Spin failed:", err);
                alert("Error processing bet. Please try again.");
                wheel.classList.remove('animate-[spin_2s_linear_infinite]');
                isSpinning = false;
                updateTotalsUI();
            }
        }

        // --- Interaction Handlers ---
        document.getElementById('chip-selector').addEventListener('click', (e) => {
            const chip = e.target.closest('.chip');
            if (!chip) return;
            
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected', 'w-14', 'h-14', 'border-[3px]', 'shadow-[0_0_15px_rgba(242,202,80,0.3)]'));
            chip.classList.add('selected', 'w-14', 'h-14', 'border-[3px]', 'shadow-[0_0_15px_rgba(242,202,80,0.3)]');
            selectedChip = parseInt(chip.dataset.chipValue);
        });

        document.querySelectorAll('.grid-bet-item').forEach(item => {
            item.addEventListener('click', () => {
                if (isSpinning) return;
                
                const betType = item.dataset.betType;
                const betValue = item.dataset.betValue;
                
                // Toggle selection (simplified for one bet at a time in this UI)
                const existingIdx = activeBets.findIndex(b => b.type === betType && b.value === betValue);
                
                if (existingIdx > -1) {
                    activeBets[existingIdx].amount += selectedChip;
                } else {
                    activeBets.push({ type: betType, value: betValue, amount: selectedChip });
                    item.classList.add('selected');
                }
                
                updateTotalsUI();
            });
        });

        document.getElementById('spin-button').addEventListener('click', handleSpin);

        // --- Initialization ---
        window.addEventListener('DOMContentLoaded', () => {
            updateBalanceUI();
            updateTotalsUI();
            fetchUserBalance();
            
            // Set initial language based on browser or default
            const browserLang = navigator.language.split('-')[0];
            if (i18n[browserLang]) currentLang = browserLang;
            
            // Apply initial localization
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (i18n[currentLang][key]) {
                    el.textContent = i18n[currentLang][key];
                }
            });
        });
    </script>
</body></html>
