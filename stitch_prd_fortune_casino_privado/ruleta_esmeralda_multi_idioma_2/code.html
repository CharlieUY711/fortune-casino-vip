<script>
    // Game State
    let balance = 25400;
    let currentBets = {}; // key: node-id, value: total amount
    let selectedChipValue = 500;
    let isSpinning = false;
    let history = [32, 15, 0, 19, 4];

    const RED_NUMS = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    const BLACK_NUMS = [2, 4, 6, 8, 10, 11, 13, 15, 17, 20, 22, 24, 26, 28, 29, 31, 33, 35];

    // Language Content
    const translations = {
        es: {
            title: "Ruleta Esmeralda",
            subtitle: "Variación de Alto Prestigio • Límites VIP",
            history: "Historial Reciente",
            clear: "LIMPIAR",
            spin: "GIRAR",
            win: "GANASTE",
            lose: "SIN PREMIO",
            insufficient: "Saldo insuficiente",
            error: "Error de red"
        },
        en: {
            title: "Emerald Roulette",
            subtitle: "High Prestige Variation • VIP Limits",
            history: "Recent History",
            clear: "CLEAR",
            spin: "SPIN",
            win: "YOU WON",
            lose: "NO WIN",
            insufficient: "Insufficient balance",
            error: "Network error"
        },
        pt: {
            title: "Roleta Esmeralda",
            subtitle: "Variação de Alto Prestígio • Limites VIP",
            history: "Histórico Recente",
            clear: "LIMPAR",
            spin: "GIRAR",
            win: "VOCÊ GANHOU",
            lose: "SEM PRÊMIO",
            insufficient: "Saldo insuficiente",
            error: "Erro de rede"
        }
    };

    let currentLang = 'es';

    function initTable() {
        const grid = document.getElementById('betting-grid');
        // Standard European Roulette Layout Logic
        // Column 3 (top row), Column 2 (middle row), Column 1 (bottom row)
        // Numbers: 3, 6, 9... (Row 1), 2, 5, 8... (Row 2), 1, 4, 7... (Row 3)
        const layout = [
            [3, 6, 9, 12, 15, 18, 21, 24, 27, 30, 33, 36],
            [2, 5, 8, 11, 14, 17, 20, 23, 26, 29, 32, 35],
            [1, 4, 7, 10, 13, 16, 19, 22, 25, 28, 31, 34]
        ];

        // We fill columns from 1 to 12
        for (let rowIdx = 0; rowIdx < 3; rowIdx++) {
            for (let colIdx = 0; colIdx < 12; colIdx++) {
                const num = layout[rowIdx][colIdx];
                const node = document.createElement('div');
                node.className = `bet-node relative py-4 cursor-pointer transition-transform active:scale-95 flex items-center justify-center font-bold ${RED_NUMS.includes(num) ? 'bg-secondary-container text-white' : 'bg-surface-container-highest text-on-surface'}`;
                node.setAttribute('data-bet', num);
                node.innerText = num;
                node.style.gridRow = rowIdx + 1;
                node.style.gridColumn = colIdx + 2;
                grid.appendChild(node);
            }
        }

        // Add event listeners
        document.querySelectorAll('.bet-node').forEach(node => {
            node.addEventListener('click', () => placeBet(node));
        });

        updateUI();
    }

    function setSelectedChip(val) {
        if (isSpinning) return;
        selectedChipValue = val;
        document.querySelectorAll('.chip-select').forEach(el => {
            el.classList.remove('ring-4', 'ring-primary', 'opacity-100');
            el.classList.add('opacity-70');
            if (parseInt(el.getAttribute('data-val')) === val) {
                el.classList.add('ring-4', 'ring-primary', 'opacity-100');
                el.classList.remove('opacity-70');
            }
        });
    }

    function placeBet(node) {
        if (isSpinning) return;
        if (balance < selectedChipValue) {
            alert(translations[currentLang].insufficient);
            return;
        }

        const betId = node.getAttribute('data-bet');
        currentBets[betId] = (currentBets[betId] || 0) + selectedChipValue;
        balance -= selectedChipValue;
        
        renderChips(node, currentBets[betId]);
        updateUI();
    }

    function renderChips(node, total) {
        let chip = node.querySelector('.chip-bet');
        if (!chip) {
            chip = document.createElement('div');
            chip.className = 'chip-bet';
            node.appendChild(chip);
        }
        chip.innerText = total >= 1000 ? (total/1000).toFixed(1) + 'k' : total;
    }

    function clearBets() {
        if (isSpinning) return;
        // Refund current bets for simulation
        for (let key in currentBets) {
            balance += currentBets[key];
        }
        currentBets = {};
        document.querySelectorAll('.chip-bet').forEach(c => c.remove());
        updateUI();
    }

    function updateUI() {
        document.getElementById('user-balance').innerText = `$${balance.toLocaleString()}`;
        document.getElementById('btn-spin').disabled = Object.keys(currentBets).length === 0 || isSpinning;
        
        // Update History
        const histContainer = document.getElementById('history-list');
        histContainer.innerHTML = '';
        history.slice(0, 8).forEach(num => {
            const el = document.createElement('div');
            let colorClass = 'bg-surface-container-highest';
            if (num === 0) colorClass = 'bg-tertiary-container text-on-tertiary';
            else if (RED_NUMS.includes(num)) colorClass = 'bg-secondary-container text-white';
            
            el.className = `min-w-[48px] aspect-square rounded-full ${colorClass} flex items-center justify-center font-headline text-lg`;
            el.innerText = num;
            histContainer.appendChild(el);
        });
    }

    async function spinWheel() {
        if (isSpinning || Object.keys(currentBets).length === 0) return;
        
        isSpinning = true;
        document.getElementById('btn-spin').disabled = true;
        document.getElementById('btn-clear').disabled = true;

        // Visual animation start
        const wheel = document.getElementById('roulette-wheel');
        wheel.classList.add('spinning');
        
        try {
            // Mocking the Supabase RPC call: 'process_bet_secure'
            // In real app: const { data, error } = await supabase.rpc('process_bet_secure', { bets: currentBets });
            const mockResult = Math.floor(Math.random() * 37);
            
            // Wait for dramatic effect
            await new Promise(r => setTimeout(r, 2500));
            
            // Calculate outcome
            const winningNumber = mockResult;
            let totalWin = calculateWin(winningNumber, currentBets);
            
            // Update balance (RPC would handle this server-side normally)
            balance += totalWin;
            
            // Stop animation and show result
            wheel.classList.remove('spinning');
            const rotation = 360 * 5 + (winningNumber * (360/37)); // Mock rotation alignment
            wheel.style.transform = `rotate(${rotation}deg)`;
            
            showResult(winningNumber, totalWin);
            
            // Update history
            history.unshift(winningNumber);
            currentBets = {};
            
            setTimeout(() => {
                document.getElementById('result-overlay').style.opacity = '0';
                document.querySelectorAll('.chip-bet').forEach(c => c.remove());
                document.querySelectorAll('.bet-node').forEach(n => n.classList.remove('win-highlight'));
                isSpinning = false;
                document.getElementById('btn-clear').disabled = false;
                updateUI();
            }, 3000);

        } catch (err) {
            alert(translations[currentLang].error);
            isSpinning = false;
            updateUI();
        }
    }

    function calculateWin(num, bets) {
        let win = 0;
        for (let betId in bets) {
            const amt = bets[betId];
            // Straight up
            if (parseInt(betId) === num) win += amt * 36;
            // Outside
            if (betId === 'red' && RED_NUMS.includes(num)) win += amt * 2;
            if (betId === 'black' && BLACK_NUMS.includes(num)) win += amt * 2;
            if (betId === 'even' && num !== 0 && num % 2 === 0) win += amt * 2;
            if (betId === 'odd' && num % 2 !== 0) win += amt * 2;
            if (betId === 'low' && num >= 1 && num <= 18) win += amt * 2;
            if (betId === 'high' && num >= 19 && num <= 36) win += amt * 2;
        }
        return win;
    }

    function showResult(num, win) {
        const overlay = document.getElementById('result-overlay');
        const numDisplay = document.getElementById('winning-number-display');
        const statusDisplay = document.getElementById('win-status');
        
        numDisplay.innerText = num;
        numDisplay.className = `text-7xl font-headline font-bold mb-2 ${num === 0 ? 'text-tertiary' : (RED_NUMS.includes(num) ? 'text-secondary' : 'text-on-surface')}`;
        
        if (win > 0) {
            statusDisplay.innerText = `${translations[currentLang].win} $${win.toLocaleString()}`;
            statusDisplay.className = "text-xl text-primary uppercase tracking-widest font-bold emerald-glow px-4 py-2 bg-black/40 rounded-full";
        } else {
            statusDisplay.innerText = translations[currentLang].lose;
            statusDisplay.className = "text-xl text-white/50 uppercase tracking-widest font-bold";
        }
        
        overlay.style.opacity = '1';

        // Highlight winning nodes
        document.querySelectorAll('.bet-node').forEach(node => {
            const b = node.getAttribute('data-bet');
            if (parseInt(b) === num || 
               (b === 'red' && RED_NUMS.includes(num)) || 
               (b === 'black' && BLACK_NUMS.includes(num)) ||
               (b === 'even' && num !== 0 && num % 2 === 0) ||
               (b === 'odd' && num % 2 !== 0)) {
                node.classList.add('win-highlight');
            }
        });
    }

    function changeLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.remove('border-b', 'border-primary', 'text-primary');
            if (btn.getAttribute('data-lang') === lang) {
                btn.classList.add('border-b', 'border-primary', 'text-primary');
            }
        });

        const t = translations[lang];
        document.getElementById('game-title').innerText = t.title;
        document.getElementById('game-subtitle').innerText = t.subtitle;
        document.getElementById('history-label').innerText = t.history;
        document.getElementById('btn-clear').innerText = t.clear;
        document.getElementById('btn-spin').innerText = t.spin;
    }

    // Initialize
    initTable();
    setSelectedChip(500);

</script>
