<!DOCTYPE html>
<html lang="es">
<head>

    <title>Fortune Casino VIP - Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #131313; color: #d0c5af; }
        h1, h2 { font-family: 'Noto Serif', serif; }
        .gold-text { color: #f2ca50; }
        .gold-border { border-color: #4d4635; }
        .gold-bg { background-color: #f2ca50; color: #131313; }
        .noir-card { background-color: #1c1b1b; border: 1px solid rgba(77, 70, 53, 0.2); }

<body class="pb-24">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 bg-[#131313] border-b border-[#4d4635]/20 px-6 h-16 flex items-center justify-between">
        <a href="index.html" class="gold-text">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
        <h1 class="gold-text font-serif italic font-bold text-lg tracking-widest">MI PERFIL VIP</h1>

    <main class="mt-20 px-6 space-y-6">

        <div class="flex flex-col items-center py-6">
            <div class="w-24 h-24 rounded-full bg-[#1c1b1b] border-2 border-[#f2ca50] p-1 mb-4 relative">
                <div class="w-full h-full rounded-full bg-[#2a2a2a] flex items-center justify-center overflow-hidden">
                    <span id="avatar-placeholder" class="text-3xl">👤</span>
                    <img id="user-avatar" class="hidden w-full h-full object-cover">
                </div>
                <div class="absolute -bottom-1 -right-1 bg-[#f2ca50] text-[#131313] text-[8px] font-bold px-2 py-1 rounded-full uppercase">VIP</div>
            </div>
            <h2 id="profile-username" class="text-xl gold-text font-bold">Cargando...</h2>
            <p id="profile-tier" class="text-[10px] uppercase tracking-widest opacity-60">Nivel: Bronce Royale</p>
        </div>

        <!-- Settings Section -->
        <section class="space-y-4">
            <h3 class="text-xs uppercase tracking-widest opacity-60 font-bold px-1">Preferencias</h3>
            
            <div class="noir-card rounded-xl p-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <span class="text-xl">🌐</span>
                    <p class="text-sm font-medium">Idioma / Language</p>
                </div>
                <select id="language-selector" class="bg-transparent gold-text text-sm font-bold focus:outline-none cursor-pointer">
                    <option value="es" class="bg-[#1c1b1b]">Español</option>
                    <option value="en" class="bg-[#1c1b1b]">English</option>
                    <option value="pt" class="bg-[#1c1b1b]">Português</option>
                </select>
            </div>

            <div class="noir-card rounded-xl p-4 flex items-center justify-between opacity-50 cursor-not-allowed">
                <div class="flex items-center gap-4">
                    <span class="text-xl">🔔</span>
                    <p class="text-sm font-medium">Notificaciones</p>
                </div>
                <div class="w-10 h-5 bg-[#2a2a2a] rounded-full relative">
                    <div class="absolute left-1 top-1 w-3 h-3 bg-[#4d4635] rounded-full"></div>
                </div>
            </div>
        </section>

        <!-- Account Section -->
        <section class="space-y-4 pt-4">
            <h3 class="text-xs uppercase tracking-widest opacity-60 font-bold px-1">Cuenta</h3>
            
            <button onclick="handleLogout()" class="w-full noir-card rounded-xl p-4 flex items-center justify-center gap-3 text-red-500 font-bold active:scale-95 transition-all">
                <span>🚪</span>
                <span class="text-sm uppercase tracking-widest">Cerrar Sesión</span>
            </button>
        </section>

        <p class="text-center text-[10px] opacity-30 italic py-8">
            Miembro de Fortune Casino desde <span id="member-since">---</span>
        </p>

    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 w-full z-50 bg-[#1c1b1b]/95 backdrop-blur-md border-t border-[#4d4635]/20 h-20 flex justify-around items-center px-4 pb-safe">
        <a href="index.html" class="flex flex-col items-center opacity-60">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] uppercase font-bold tracking-tighter mt-1">Lobby</span>
        </a>
        <a href="billetera.html" class="flex flex-col items-center opacity-60">
            <span class="text-xl">💰</span>
            <span class="text-[10px] uppercase font-bold tracking-tighter mt-1">Wallet</span>
        </a>
        <a href="perfil.html" class="flex flex-col items-center gold-text">
            <span class="text-xl">👤</span>
            <span class="text-[10px] uppercase font-bold tracking-tighter mt-1">Profile</span>
        </a>
    </nav>

    <script>
        const SUPABASE_URL = "https://gfxxhquajzcdslayhmhs.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmeHhocXVhanpjZHNsYXlobmhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODQzMDUsImV4cCI6MjA5MDU2MDMwNX0.gXYTjPKzBHmHJclvEWhfvqUoEaCYaj8OSqKaMkd8zHc";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function initProfile() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                if (profile) {
                    document.getElementById('profile-username').innerText = profile.username || 'VIP Member';
                    document.getElementById('profile-tier').innerText = `Nivel: ${profile.vip_level}`;
                    document.getElementById('member-since').innerText = new Date(profile.created_at).toLocaleDateString();
                    if (profile.avatar_url) {
                        document.getElementById('user-avatar').src = profile.avatar_url;
                        document.getElementById('user-avatar').classList.remove('hidden');
                        document.getElementById('avatar-placeholder').classList.add('hidden');
                    }
                }
            } else {
                window.location.href = 'registro.html';
            }
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            window.location.href = 'registro.html';
        }

        initProfile();
    </script>
</body>
</html>
